<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 76" width="80" height="76">
  <defs>
    <linearGradient id="fav-ear" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C2A6FF"/>
      <stop offset="60%" stop-color="#8B6FFF"/>
      <stop offset="100%" stop-color="#5C4BE0"/>
    </linearGradient>
  </defs>
  <rect width="80" height="76" rx="14" fill="#0E1220"/>
  <!-- LEFT EAR — taller, slight outward lean -->
  <path d="M 18 3 L 30 24 L 28 42 L 10 24 Z"
        stroke="url(#fav-ear)" stroke-width="3.4" fill="none"
        stroke-linejoin="miter" stroke-miterlimit="8"/>
  <!-- RIGHT EAR -->
  <path d="M 62 3 L 70 24 L 52 42 L 50 24 Z"
        stroke="url(#fav-ear)" stroke-width="3.4" fill="none"
        stroke-linejoin="miter" stroke-miterlimit="8"/>
  <!-- LEFT EYE -->
  <rect x="17" y="40" width="15" height="22" rx="3.5" fill="none" stroke="#fff" stroke-width="3"/>
  <!-- RIGHT EYE -->
  <rect x="48" y="40" width="15" height="22" rx="3.5" fill="none" stroke="#fff" stroke-width="3"/>
  <!-- SNOUT -->
  <path fill="#fff" d="M 32 62 L 48 62 L 50 66 L 40 73 L 30 66 Z"/>
  <!-- NOSTRILS -->
  <rect x="35.5" y="64" width="2.5" height="5" rx="0.5" fill="#0E1220"/>
  <rect x="42" y="64" width="2.5" height="5" rx="0.5" fill="#0E1220"/>
</svg>
